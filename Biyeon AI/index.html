<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiYeon Racing AI | Singapore 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="Icon.png">
    <style>
        /* 1. Base Layout */
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #101c28 100%);
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 2. Background Logo */
        .background-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        /* 3. Header */
        .header {
            margin-top: 5vh;
            text-align: center;
        }
        .header h1 {
            font-family: 'Racing Sans One', sans-serif;
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: #FF0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            margin: 0;
            font-style: italic;
        }
        .sub-text {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 0;
        }

        /* 4. AI Response Area */
        .ai-content {
            flex: 1;
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 0;
            overflow: hidden; /* Prevents this container from expanding body height */
        }

        .response-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 40px;
            backdrop-filter: blur(10px);
            width: 100%;
    
    /* --- CRITICAL FIX --- */
            height: 100%; /* Fill the available flex space */
            max-height: 55vh; /* Limits height so it never pushes the bar down */
            overflow-y: auto; /* Internal scrolling only */
            box-sizing: border-box;
        }

        /* AI Text Styling */
        .ai-text-glow {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #e0e0e0;
        }
        .ai-text-glow strong {
            color: #FF0000;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff00;
        }

        /* 5. Suggestions Styling */
        .suggestions-container {
            display: none; 
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .suggestions-container button {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #FF0000;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .suggestions-container button:hover {
            background: #FF0000;
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* 6. Input Area & Interaction */
        .input-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.9); /* Slightly darker for contrast */
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            margin-top: auto; /* Sticks to bottom of flex container */
        }

        .input-area:hover .suggestions-container,
        .input-area:focus-within .suggestions-container {
            display: flex;
            animation: slideUp 0.4s ease-out;
        }
        
        .input-wrapper {
            width: 85%;
            max-width: 1000px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: radial-gradient(circle, #1a1a1a 0%, #101c28 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 18px 25px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s;
        }

        #user-input:focus {
            border-color: #FF0000;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .send-btn {
            background: #FF0000;
            color: white;
            border: none;
            border-radius: 15px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .suggestions-container button:active {
            transform: translateY(0px) scale(0.95); /* Moves down and shrinks */
            background: #FF0000;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
            transition: all 0.1s; /* Fast snap for the click */
        }

            /* Effect for the Main Red Send Button */
        .send-btn:active {
            transform: scale(0.92); /* Shrinks slightly more for a 'deep' click feel */
            background: #990000; /* Darkens the red to show pressure */
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5); /* Adds an inner shadow */
            transition: all 0.1s;
        }
    </style>
</head>
<body>

    <img src="Biyeon Logo.png" alt="Biyeon Racing Logo" class="background-logo">

    <div class="header">
        <h1>BiYeon RACING</h1>
        <p class="sub-text">Singapore World Finals 2026</p>
    </div>

    <div class="ai-content">
        <div class="response-box" id="scroll-box">
            <p style="margin-top: 0; opacity: 1;"><span class="status-dot"></span>  </p>
            <div id="ai-response">
                <h2 style="margin-bottom: 10px; font-size: 2.2rem; font-family: 'Racing Sans One'; color: white;">Ask anything about BiYeon Racing!</h2>
                <p style="line-height: 1.6; color: #ccc; margin: 0; font-size: 1.1rem;">
                    Welcome to BiYeon Racing Pit Display. I am the official BiYeon AI.
                </p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="suggestions-container">
            <button onclick="quickAsk('What is BiYeon Racing?')">About BiYeon Racing</button>
            <button onclick="quickAsk('Explain the aerodynamics of the Mk.5 car.')">BiYeon Racing's engineering in cars</button>
            <button onclick="quickAsk('What is your goal for the World Finals?')">What is Biyeon Racing's goal this year?</button>
        </div>

        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Type or click a suggestion above...">
            <button class="send-btn" onclick="askBiyeonAI()">
                <span class="material-icons">arrow_forward</span>
            </button> 
        </div>
    </div>

    <script>
    const GITHUB_TOKEN = '***'; 
    const userInput = document.getElementById('user-input');
    const aiResponse = document.getElementById('ai-response');
    const suggestions = document.querySelector('.suggestions-container'); 

    const SYSTEM_PROMPT = `
    You are the BiYeon Racing Mk.5 Telemetry AI. Professional racing engineer for 2026 Singapore World Finals.
    [IDENTITY] BiYeon (飛 Fly + 燕 Swallow). Slogan: "Swallow the Sky".
    [ROSTER] Andy Park(PM), Joon Park(Biz), Susie Lee(Design), Kaylin Lee(Eng), Junee Kim(Mfg), Sangwoo Eom(CAD).
    [GOAL] 1st Place at Singapore World Finals (First Korean team on podium).
    
    [FORMAT RULES]
    1. Language: English only. No emojis.
    2. Use **bold** for key technical terms.
    3. For lists: Use the "•" symbol. Every "•" must be on a new line.
    4. Keep explanations concise.
    `;

    // --- NEW: Typewriter Function ---
    function typeWriter(text, elementId, speed = 20) {
        let i = 0;
        const target = document.getElementById(elementId);
        target.innerHTML = ""; // Clear the box before typing

        function typing() {
            if (i < text.length) {
                // If the text contains HTML tags (like <br> or <strong>), 
                // we need to handle them so they don't break the effect.
                if (text.substring(i, i + 4) === "<br>") {
                    target.innerHTML += "<br>";
                    i += 4;
                } else if (text.substring(i, i + 8) === "<strong>") {
                    let endTag = text.indexOf("</strong>", i);
                    target.innerHTML += text.substring(i, endTag + 9);
                    i = endTag + 9;
                } else {
                    target.innerHTML += text.charAt(i);
                    i++;
                }
                setTimeout(typing, speed);
            }
        }
        typing();
    }
    function typing() {
    if (i < text.length) {
        // ... (your existing if/else logic for <br> and <strong>) ...
        
        // ADD THIS LINE:
        document.getElementById('scroll-box').scrollTop = document.getElementById('scroll-box').scrollHeight;
        
        setTimeout(typing, speed);
    }
}
function typeWriter(text, elementId, speed = 20) {
    let i = 0;
    const target = document.getElementById(elementId);
    const scrollBox = document.getElementById('scroll-box'); // Get the box container
    target.innerHTML = ""; 

    function typing() {
        if (i < text.length) {
            if (text.substring(i, i + 4) === "<br>") {
                target.innerHTML += "<br>";
                i += 4;
            } else if (text.substring(i, i + 8) === "<strong>") {
                let endTag = text.indexOf("</strong>", i);
                target.innerHTML += text.substring(i, endTag + 9);
                i = endTag + 9;
            } else {
                target.innerHTML += text.charAt(i);
                i++;
            }

            // --- 🏁 THE AUTO-SCROLL LINE 🏁 ---
            // This forces the scrollbar to the bottom as new lines appear
            scrollBox.scrollTop = scrollBox.scrollHeight;

            setTimeout(typing, speed);
        }
    }
    typing();
}

    async function askBiyeonAI() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        suggestions.style.display = 'none';
        aiResponse.innerHTML = `<p style="color: #00ff00; font-family: 'Racing Sans One';"> Generating... 🏎️💨</p>`;
        
        const currentPrompt = prompt;
        userInput.value = "";

        try {
            const url = "https://models.inference.ai.azure.com/chat/completions";
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", 
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        { role: "user", content: currentPrompt }
                    ],
                    temperature: 0.5
                })
            });

            const data = await response.json();

            if (data.choices && data.choices[0].message.content) {
                const result = data.choices[0].message.content;

                // Formatting Logic
                let formattedResult = result
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') 
                    .replace(/\n/g, '<br>') 
                    .split('•')
                    .filter(item => item.trim() !== "")
                    .map(item => `• ${item.trim()}`)
                    .join('<br>'); 

                // Injecting Question Box immediately
                aiResponse.innerHTML = `
                    <div style="margin-bottom: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border-left: 4px solid #FF0000;">
                        <span style="color: #FF0000; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px;">Question:</span><br>
                        <span style="color: #ffffff; font-size: 1.1rem;">${currentPrompt}</span>
                    </div>
                    
                    <div class="ai-text-glow" style="padding-left: 5px;">
                        <span style="color: #00ff00; font-weight: bold; letter-spacing: 1px;">Answer:</span><br><br>
                        <span id="typing-area"></span>
                    </div>
                `;
                
                // Start the Typewriter effect
                typeWriter(formattedResult, "typing-area", 15);
                
                document.getElementById('scroll-box').scrollTop = 0;
            }
        } catch (error) {
            aiResponse.innerHTML = `<span style="color: #FF0000;">[SYSTEM_ERROR]</span>`;
        } finally {
            suggestions.style.display = 'flex';
        }
    }

    function quickAsk(question) {
        userInput.value = question;
        askBiyeonAI();
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askBiyeonAI();
    });
</script>
</body>
</html>
